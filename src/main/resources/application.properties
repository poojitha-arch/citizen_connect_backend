spring.application.name=citizen-connect-backend

# Disable Spring Boot's DataSource autoconfiguration - we manage it manually in DatabaseConfig.java
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Database Configuration - raw URL (may contain embedded credentials like postgresql://user:pass@host/db)
# DatabaseConfig.java will parse this and create a proper JDBC DataSource
db.url.raw=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/citizen_connect}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=${SERVER_PORT:8080}

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:donipatipoojitha@gmail.com}
spring.mail.password=${MAIL_PASSWORD:jgdggwifluvblnur}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
